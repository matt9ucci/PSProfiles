#cloud-config

# https://cloudinit.readthedocs.io/en/latest/topics/modules.html#package-update-upgrade-install
package_update: true
package_upgrade: true
package_reboot_if_required: true

packages:
  - docker-ce

users:
  - name: ubuntu
    groups: docker

apt:
  preserve_sources_list: true
  sources:
    docker:
      keyid: 0EBFCD88
      keyserver: https://download.docker.com/linux/ubuntu/gpg
      source: deb https://download.docker.com/linux/ubuntu $RELEASE stable
snap:
    commands:
      - snap install powershell --classic
      # - /snap/bin/pwsh -c 'Install-Module DockerCompletion -Force -ErrorAction Ignore'
      # - /snap/bin/pwsh -c 'New-Item $PROFILE -ItemType File -Force && Add-Content $PROFILE "Set-Alias d docker", "Import-Module DockerCompletion"'

runcmd:
  - curl https://raw.githubusercontent.com/docker/cli/master/contrib/completion/bash/docker -o /etc/bash_completion.d/docker.sh

write_files:
  - content: |
      # ---- Content of DockerMultipass.yaml START ----
      alias d='docker'
      alias sl='cd'
      # ---- Content of DockerMultipass.yaml END ----
    append: true
    path: /etc/skel/.bashrc
